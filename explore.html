<!DOCTYPE html>

<head>

</head>
<body>

  <!-- Navigation -->

    <div class="nav-content">

      <div class="nav-links" id="navLinks">

        <a href="categories.html" class="nav-link">分类</a>
        <a href="rankings.html" class="nav-link">排行榜</a>
      </div>
      <div class="nav-right">
        <div class="lang-switch">
          <button class="lang-btn active" data-lang="zh">中</button>
          <span class="lang-divider">/</span>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <a href="search.html" class="search-toggle" id="searchToggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </a>
        <a href="login.html" class="nav-login">登录</a>
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <div class="light-rays"></div>
    <div class="bokeh-container">
      <div class="bokeh"></div>
      <div class="bokeh"></div>
      <div class="bokeh"></div>
    </div>
    <h1 class="page-title">发现</h1>
    <p class="page-subtitle">Explore</p>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab active" data-filter="all">全部</button>
  </div>

  <!-- Photo Grid -->
  <div class="photo-grid" id="photoGrid">
    <!-- Photos will be loaded dynamically -->
  </div>

  <!-- Load More -->
  <div style="text-align:center; padding: 2rem 0 4rem;">
    <button class="hero-btn" id="loadMoreBtn" style="font-size:0.8rem; padding:0.75rem 2rem;">加载更多</button>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-logo">
        <span class="logo-cn">影子</span>
        <span class="logo-divider">|</span>
        <span class="logo-en">ShadowLens</span>
      </div>
      <div class="footer-links">
        <a href="explore.html">发现</a>
        <a href="categories.html">分类</a>
        <a href="rankings.html">排行榜</a>
        <a href="login.html">登录</a>
      </div>
      <p class="footer-text">发现摄影的艺术</p>
      <p class="footer-copyright">&copy; 2024 ShadowLens. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/pages.js"></script>
  <script>
    initExplorePage();

    // Load more functionality
    (function() {
      const btn = document.getElementById('loadMoreBtn');
      const grid = document.getElementById('photoGrid');
      if (!btn || !grid) return;

      let currentFilter = 'all';
      let loadedCount = 12;

      // Track filter changes
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          currentFilter = tab.dataset.filter;
          loadedCount = 12;
        });
      });

      btn.addEventListener('click', () => {
        let userPosts = [];
        try { userPosts = JSON.parse(localStorage.getItem('sl_user_posts') || '[]'); } catch(e) {}
        const allData = [...userPosts, ...allPhotos];
        const filtered = currentFilter === 'all' ? allData : allData.filter(p => p.category === currentFilter);
        const nextBatch = filtered.slice(loadedCount, loadedCount + 9);

        if (nextBatch.length === 0) {
          btn.textContent = '已加载全部';
          btn.disabled = true;
          btn.style.opacity = '0.5';
          return;
        }

        nextBatch.forEach((photo, i) => {
          const card = document.createElement('div');
          card.innerHTML = createPhotoCard(photo);
          const newCard = card.firstElementChild;
          newCard.style.opacity = '0';
          newCard.style.transform = 'translateY(20px)';
          grid.appendChild(newCard);

          setTimeout(() => {
            newCard.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
            newCard.style.opacity = '1';
            newCard.style.transform = 'translateY(0)';
          }, i * 80);
        });

        loadedCount += nextBatch.length;
        initPhotoCardEvents();
      });
    })();
  </script>
</body>
</html>
