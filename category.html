<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分类 | 影子 ShadowLens</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;600&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar" class="navbar visible">
    <div class="nav-content">
      <a href="index.html" class="logo">
        <span class="logo-cn">影子</span>
        <span class="logo-divider">|</span>
        <span class="logo-en">ShadowLens</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="explore.html" class="nav-link">发现</a>
        <a href="categories.html" class="nav-link active">分类</a>
        <a href="rankings.html" class="nav-link">排行榜</a>
      </div>
      <div class="nav-right">
        <div class="lang-switch">
          <button class="lang-btn active" data-lang="zh">中</button>
          <span class="lang-divider">/</span>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <a href="search.html" class="search-toggle" id="searchToggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </a>
        <a href="login.html" class="nav-login">登录</a>
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Category Hero -->
  <div class="category-hero" id="categoryHero">
    <div class="light-rays"></div>
    <div class="bokeh-container">
      <div class="bokeh"></div>
      <div class="bokeh"></div>
      <div class="bokeh"></div>
      <div class="bokeh"></div>
      <div class="bokeh"></div>
    </div>
    <div class="lens-flare"></div>
    <div class="light-leak"></div>
    <div class="hero-spotlight" id="heroSpotlight"></div>
    <div class="category-hero-content">
      <h1 class="category-hero-title" id="catTitle">风景</h1>
      <p class="category-hero-subtitle" id="catSubtitle">Landscape</p>
      <p class="category-hero-desc" id="catDesc"></p>
    </div>
  </div>

  <!-- Subcategory Navigation -->
  <div class="sub-nav" id="subNav"></div>

  <!-- Photo Grid -->
  <div class="photo-grid" id="photoGrid">
    <!-- Photos will be loaded dynamically -->
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-logo">
        <span class="logo-cn">影子</span>
        <span class="logo-divider">|</span>
        <span class="logo-en">ShadowLens</span>
      </div>
      <div class="footer-links">
        <a href="explore.html">发现</a>
        <a href="categories.html">分类</a>
        <a href="rankings.html">排行榜</a>
        <a href="login.html">登录</a>
      </div>
      <p class="footer-text">发现摄影的艺术</p>
      <p class="footer-copyright">© 2024 ShadowLens. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/pages.js"></script>
  <script>
    initCategoryPage();

    // Hero Spotlight Effect
    (function() {
      const hero = document.getElementById('categoryHero');
      const spotlight = document.getElementById('heroSpotlight');
      if (!hero || !spotlight) return;

      hero.addEventListener('mousemove', (e) => {
        const rect = hero.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        spotlight.style.setProperty('--spot-x', x + '%');
        spotlight.style.setProperty('--spot-y', y + '%');
      });
    })();
  </script>
</body>
</html>
