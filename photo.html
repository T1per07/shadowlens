<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品详情 | 影子 ShadowLens</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;600&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    .photo-detail {
      max-width: 1200px;
      margin: 0 auto;
      padding: 6rem 3rem 4rem;
    }
    .photo-detail-img {
      width: 100%;
      max-height: 80vh;
      object-fit: contain;
      margin-bottom: 3rem;
      cursor: zoom-in;
      transition: transform 0.3s ease;
      border-radius: 4px;
    }
    .photo-detail-img:hover {
      transform: scale(1.01);
    }
    .photo-detail-info {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .photo-detail-title {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .photo-detail-author {
      font-size: 1rem;
      color: var(--color-text-light);
    }
    .photo-detail-author a {
      color: var(--color-text);
      text-decoration: none;
    }
    .photo-detail-author a:hover {
      text-decoration: underline;
    }
    .photo-detail-desc {
      font-family: var(--font-serif);
      font-size: 0.95rem;
      color: var(--color-text-light);
      margin-top: 0.75rem;
      line-height: 1.8;
    }
    .photo-detail-stats {
      display: flex;
      gap: 2rem;
      font-size: 0.875rem;
      color: var(--color-text-muted);
    }
    .photo-detail-stats span {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .photo-detail-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }
    .action-btn {
      font-family: var(--font-sans);
      font-size: 0.8rem;
      padding: 0.8rem 1.8rem;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: var(--color-text);
      cursor: pointer;
      transition: all 0.4s var(--transition-smooth);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-radius: 50px;
      position: relative;
      overflow: hidden;
    }
    .action-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--color-accent), var(--color-accent-light));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s var(--transition-smooth);
      z-index: -1;
      border-radius: 50px;
    }
    .action-btn:hover {
      color: #fff;
      border-color: var(--color-accent);
      box-shadow: 0 0 20px rgba(139,115,85,0.2);
      transform: translateY(-2px);
    }
    .action-btn:hover::before {
      transform: scaleX(1);
    }
    .action-btn.liked {
      background: linear-gradient(135deg, var(--color-accent), var(--color-accent-light));
      color: #fff;
      border-color: var(--color-accent);
      box-shadow: 0 0 20px rgba(139,115,85,0.3);
    }
    .photo-detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .photo-detail-meta {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: var(--color-text-muted);
      line-height: 2;
    }
    .photo-detail-meta p {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    @media (max-width: 768px) {
      .photo-detail {
        padding: 5rem 1.5rem 2rem;
      }
      .photo-detail-info {
        flex-direction: column;
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Noise overlay -->
  <div class="noise-overlay"></div>

  <!-- Navigation -->

    <div class="nav-content">
      <a href="index.html" class="logo">
        <span class="logo-cn">影子</span>
        <span class="logo-divider">|</span>
        <span class="logo-en">ShadowLens</span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="explore.html" class="nav-link">发现</a>
        <a href="categories.html" class="nav-link">分类</a>
        <a href="rankings.html" class="nav-link">排行榜</a>
      </div>
      <div class="nav-right">
        <div class="lang-switch">
          <button class="lang-btn active" data-lang="zh">中</button>
          <span class="lang-divider">/</span>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <a href="search.html" class="search-toggle" id="searchToggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </a>
        <a href="login.html" class="nav-login">登录</a>
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Photo Detail -->
  <div class="photo-detail" id="photoDetail">
    <!-- Content will be loaded dynamically -->
  </div>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox">
    <button class="lightbox-close" id="lightboxClose">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <img src="" alt="" id="lightboxImg">
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-logo">
        <span class="logo-cn">影子</span>
        <span class="logo-divider">|</span>
        <span class="logo-en">ShadowLens</span>
      </div>
      <div class="footer-links">
        <a href="explore.html">发现</a>
        <a href="categories.html">分类</a>
        <a href="rankings.html">排行榜</a>
        <a href="login.html">登录</a>
      </div>
      <p class="footer-text">发现摄影的艺术</p>
      <p class="footer-copyright">&copy; 2024 ShadowLens. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/pages.js"></script>
  <script>initPhotoPage();</script>
</body>
</html>
