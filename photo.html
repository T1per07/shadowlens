<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品详情 | 影子 ShadowLens</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;600&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    .photo-detail {
      max-width: 1200px;
      margin: 0 auto;
      padding: 6rem 3rem 4rem;
    }
    .photo-detail-img {
      width: 100%;
      max-height: 80vh;
      object-fit: contain;
      margin-bottom: 3rem;
    }
    .photo-detail-info {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 3rem;
      padding-bottom: 3rem;
      border-bottom: 1px solid var(--color-border);
    }
    .photo-detail-title {
      font-family: var(--font-serif);
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .photo-detail-author {
      font-size: 1rem;
      color: var(--color-text-light);
    }
    .photo-detail-author a {
      color: var(--color-text);
      text-decoration: none;
    }
    .photo-detail-author a:hover {
      text-decoration: underline;
    }
    .photo-detail-stats {
      display: flex;
      gap: 2rem;
      font-size: 0.875rem;
      color: var(--color-text-muted);
    }
    .photo-detail-actions {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }
    .action-btn {
      font-family: var(--font-sans);
      font-size: 0.875rem;
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--color-border);
      background: none;
      color: var(--color-text);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .action-btn:hover {
      background: var(--color-text);
      color: var(--color-bg);
    }
    .photo-detail-meta {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: var(--color-text-muted);
      line-height: 2;
    }
    @media (max-width: 768px) {
      .photo-detail {
        padding: 5rem 1.5rem 2rem;
      }
      .photo-detail-info {
        flex-direction: column;
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar" class="navbar visible">
    <div class="nav-content">
      <a href="index.html" class="logo">
        <span class="logo-cn">影子</span>
        <span class="logo-divider">|</span>
        <span class="logo-en">ShadowLens</span>
      </a>
      <div class="nav-links">
        <a href="explore.html" class="nav-link">发现</a>
        <a href="categories.html" class="nav-link">分类</a>
        <a href="rankings.html" class="nav-link">排行榜</a>
      </div>
      <div class="nav-right">
        <div class="lang-switch">
          <button class="lang-btn active" data-lang="zh">中</button>
          <span class="lang-divider">/</span>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <a href="search.html" class="search-toggle" id="searchToggle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </a>
        <a href="login.html" class="nav-login">登录</a>
      </div>
    </div>
  </nav>

  <!-- Photo Detail -->
  <div class="photo-detail" id="photoDetail">
    <!-- Content will be loaded dynamically -->
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-logo">
        <span class="logo-cn">影子</span>
        <span class="logo-divider">|</span>
        <span class="logo-en">ShadowLens</span>
      </div>
      <div class="footer-links">
        <a href="explore.html">发现</a>
        <a href="categories.html">分类</a>
        <a href="rankings.html">排行榜</a>
        <a href="login.html">登录</a>
      </div>
      <p class="footer-text">发现摄影的艺术</p>
      <p class="footer-copyright">© 2024 ShadowLens. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/pages.js"></script>
  <script>initPhotoPage();</script>
</body>
</html>
